name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::377002868347:role/clean-image-github-deploy
          aws-region: ap-south-1

      - name: Resolve target instance
        id: target
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters Name=tag:Name,Values=clean-image-backend Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running clean-image-backend instance found" >&2
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Send deploy command
        id: deploy
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          python3 <<'PY' >/tmp/ssm-params.json
          import json
          commands = [
              "set -eu",
              "cd /opt/clean-image",
              "git fetch origin main",
              "git checkout main",
              "git pull --ff-only origin main",
              "bash /opt/clean-image/deploy/update-instance.sh",
          ]
          print(json.dumps({"commands": commands}))
          PY

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy clean-image from GitHub Actions" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
        run: |
          set -euo pipefail

          for _ in $(seq 1 120); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json
